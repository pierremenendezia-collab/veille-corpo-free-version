name: Veille Corporate Quotidienne

on:
  schedule:
    # Tous les jours ouvrés à 9h00 Paris (= 7h00 UTC en été, 8h00 UTC en hiver)
    # On lance à 7h00 UTC = 9h00 Paris en été. Ajuste si besoin.
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # Permet aussi de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write  # Nécessaire pour committer les outputs

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Run daily veille
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        run: python run_daily.py --lookback 2

      - name: Commit outputs (results.json + digest.md uniquement)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # On ajoute UNIQUEMENT les results.json et digest.md, pas les HTML bruts
          git add 'outputs/*/results.json' 'outputs/*/digest.md' 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: outputs du $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Aucun nouvel output à committer"
          fi
